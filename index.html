<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Barcode & Foto Bukti</title>
    <!-- Library HTML5-QRCode -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --success: #10b981;
            --error: #ef4444;
            --surface: #ffffff;
            --background: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 20px 16px; 
            max-width: 480px; 
            margin: auto; 
            background-color: var(--background);
            color: var(--text-main);
        }
        .container {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 1.5rem;
            color: var(--text-main);
        }
        #reader { 
            width: 100%; 
            margin-bottom: 20px; 
            border: 2px dashed var(--border) !important;
            border-radius: var(--radius);
            overflow: hidden;
        }
        #reader button {
            background-color: var(--primary);
            color: white;
            border-radius: 6px;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            margin: 10px;
        }
        .form-group { margin-bottom: 15px; }
        label { 
            font-weight: 600; 
            display: block; 
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text-main);
        }
        input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="file"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
        .success { color: var(--success); }
        .error { color: var(--error); }
        
        /* Gaya untuk Box Verifikasi */
        .verification-box { 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            display: none; 
            font-size: 0.95rem; 
            text-align: center; 
        }
        .verification-box.success-box { display: block; background-color: #d1fae5; color: #065f46; border: 1px solid var(--success); }
        .verification-box.error-box { display: block; background-color: #fee2e2; color: #991b1b; border: 1px solid var(--error); }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Scanner & Upload Bukti</h2>

        <!-- Area Scanner -->
        <div id="reader"></div>

        <!-- Form Input -->
        <div class="form-group">
            <label>Hasil Scan Barcode/QR:</label>
            <input type="text" id="barcodeResult" readonly placeholder="Arahkan kamera ke Barcode">
        </div>

        <!-- Area Hasil Verifikasi -->
        <div id="verificationResult" class="verification-box"></div>

        <div class="form-group">
            <label>Foto Bukti:</label>
            <input type="file" id="photoProof" accept="image/*" capture="environment">
        </div>

        <button id="submitBtn" onclick="submitData()">Simpan Data</button>
        <div id="status"></div>
    </div>

    <script>
        // GANTI dengan URL Web App Google Apps Script Anda
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxmaQpC2WzS-o91y-GsoPDGcauKbLhsw1UxSdgIQBrSWTCrX0v54060k4BJj5JWubpw/exec';

        // Variabel untuk menampung data dari Google Sheets
        let masterData = [];

        // Mengambil data master dari Google Sheets saat aplikasi pertama kali dibuka
        async function fetchMasterData() {
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if (result.status === 'success') {
                    masterData = result.data;
                    console.log("Database Material berhasil dimuat: ", masterData.length, "item");
                }
            } catch (error) {
                console.error("Gagal memuat database material:", error);
            }
        }
        
        // Jalankan penarikan data segera setelah script dijalankan
        fetchMasterData();

        // Inisialisasi html5-qrcode
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('barcodeResult').value = decodedText;
            
            // Proses Verifikasi
            const verificationDiv = document.getElementById('verificationResult');
            const match = masterData.find(item => item.kode === decodedText);

            if (match) {
                verificationDiv.innerHTML = `✅ <strong>Verified:</strong> ${match.nama}`;
                verificationDiv.className = 'verification-box success-box';
            } else {
                verificationDiv.innerHTML = `❌ <strong>Tidak Dikenali:</strong> Data tidak ada di sistem!`;
                verificationDiv.className = 'verification-box error-box';
            }
        }

        html5QrcodeScanner.render(onScanSuccess);

        async function submitData() {
            const barcodeText = document.getElementById('barcodeResult').value;
            const photoInput = document.getElementById('photoProof');
            const statusDiv = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');

            if (!barcodeText) {
                alert('Silakan scan barcode atau QR code terlebih dahulu.');
                return;
            }

            if (photoInput.files.length === 0) {
                alert('Silakan ambil atau unggah foto bukti terlebih dahulu.');
                return;
            }

            // Ubah UI ke status loading
            submitBtn.disabled = true;
            submitBtn.innerText = 'Mengirim...';
            statusDiv.innerHTML = 'Sedang memproses dan mengunggah data...';
            statusDiv.className = '';

            const file = photoInput.files[0];
            const reader = new FileReader();

            reader.onloadend = async function() {
                // Menghilangkan prefix "data:image/jpeg;base64," agar aman di-decode oleh GAS
                const base64String = reader.result.split(',')[1];

                const payload = {
                    barcodeText: barcodeText,
                    base64Photo: base64String
                };

                try {
                    // Gunakan text/plain untuk mengakali masalah preflight CORS di Google Apps Script
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (result.status === 'success') {
                        statusDiv.innerHTML = 'Data dan foto berhasil disimpan!';
                        statusDiv.className = 'success';
                        
                        // Reset Form
                        document.getElementById('barcodeResult').value = '';
                        photoInput.value = '';
                        document.getElementById('verificationResult').className = 'verification-box'; // Sembunyikan box verifikasi
                    } else {
                        statusDiv.innerHTML = 'Gagal menyimpan: ' + result.message;
                        statusDiv.className = 'error';
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    statusDiv.innerHTML = 'Terjadi kesalahan jaringan/server saat mengirim data.';
                    statusDiv.className = 'error';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Simpan Data';
                }
            };

            // Membaca file gambar sebagai Base64
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
