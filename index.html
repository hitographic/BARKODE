<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Barcode & Foto Bukti</title>
    <!-- Library HTML5-QRCode -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2415/2415286.png">
    <link rel="icon" href="./logo/Logo Barkode.png">
    <link rel="apple-touch-icon" href="./logo/Logo Barkode.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #059669;
            --error: #dc2626;
            --text-main: #0f172a;
            --text-muted: #475569;
            --radius: 24px;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 20px 16px; 
            max-width: 480px; 
            margin: auto; 
            background: #e0c3fc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(190, 100%, 80%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(240, 100%, 85%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(320, 100%, 85%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(150, 100%, 80%, 1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 32px 24px;
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .header-logo {
            height: 42px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        h2, h3 {
            text-align: center;
            margin: 0;
            margin-bottom: 24px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        #reader { 
            width: 100%; 
            margin-bottom: 24px; 
            border: none !important;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0,0,0,0.03);
            box-shadow: inset 0 0 0 1px var(--glass-border), 0 8px 24px rgba(0,0,0,0.05);
        }
        #reader button {
            background: var(--glass-bg);
            color: var(--primary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 16px;
            cursor: pointer;
            margin: 10px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .form-group { margin-bottom: 18px; }
        label { 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block; 
            margin-bottom: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        input[type="text"], input[type="file"], input[type="date"], input[type="email"], input[type="password"] { 
            width: 100%; 
            padding: 14px 16px; 
            box-sizing: border-box;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.4);
            color: var(--text-main);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, input[type="file"]:focus, input[type="date"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 0 0 4px rgba(255,255,255,0.4);
        }
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-container input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            user-select: none;
            color: var(--text-muted);
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .toggle-password:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.05);
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: rgba(255, 255, 255, 0.5); 
            color: var(--primary); 
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            font-size: 16px; 
            cursor: pointer;
            font-weight: 700;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        #loginBtn, #sendEmailBtn {
            background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        #loginBtn:hover:not(:disabled), #sendEmailBtn:hover:not(:disabled) {
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.5);
            background: linear-gradient(135deg, var(--primary-hover) 0%, #4f46e5 100%);
        }
        button:disabled { 
            background: rgba(255, 255, 255, 0.3) !important; 
            color: #94a3b8 !important;
            box-shadow: none !important;
            cursor: not-allowed; 
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
        }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
        .success { color: var(--success); }
        .error { color: var(--error); }
        
        .verification-box { 
            padding: 16px; 
            margin-bottom: 20px; 
            border-radius: 16px; 
            display: none; 
            font-size: 0.95rem; 
            text-align: center; 
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .verification-box.success-box { display: block; background-color: rgba(209, 250, 229, 0.85); color: #064e3b; border: 1px solid rgba(16, 185, 129, 0.5); }
        .verification-box.error-box { display: block; background-color: rgba(254, 226, 226, 0.85); color: #7f1d1d; border: 1px solid rgba(239, 68, 68, 0.5); }

        .tabs { 
            display: flex; gap: 8px; margin-bottom: 24px; 
            background: rgba(255,255,255,0.25); 
            padding: 6px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
        }
        .tab-btn { 
            margin-top: 0; 
            padding: 12px; 
            background: transparent; 
            border: none; 
            box-shadow: none; 
            border-radius: 14px; 
            color: var(--text-muted); 
            font-weight: 600; 
        }
        .tab-btn.active { 
            background: #ffffff; 
            color: var(--primary); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .search-filter-container { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-filter-container input { margin-bottom: 0; }
        
        .table-responsive { 
            overflow-x: auto; 
            margin: 15px 0; 
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 14px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.3); text-align: left; }
        th { background: rgba(255, 255, 255, 0.4); font-weight: 600; color: var(--text-main); }
        
        .action-bar { 
            background: rgba(255, 255, 255, 0.35); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            margin-top: 20px; 
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .pagination { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: 600; margin-top: 15px; }
        .pagination button { 
            width: auto; padding: 10px 16px; margin-top: 0; font-size: 0.85rem; 
            background: rgba(255, 255, 255, 0.6); color: var(--text-main); 
            border: 1px solid var(--glass-border); box-shadow: none; 
        }
        .pagination button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.9); transform: none; }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(15, 23, 42, 0.6);
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        /* Login View */
        #app-screen { display: none; }
    </style>
</head>
<body>

    <!-- WADAH LOGIN -->
    <div id="login-screen" class="container" style="margin-top: 50px;">
        <div class="header-container" style="margin-bottom: 30px;">
            <img src="./logo/Logo Barkode Head.png" alt="Logo" class="header-logo" style="height: 48px;">
        </div>
        <h3 style="text-align:center; margin-top:0;">Masuk Sistem</h3>
        <div class="form-group">
            <label>NIK</label>
            <input type="text" id="loginNik" placeholder="Masukkan NIK">
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-container">
                <input type="password" id="loginPassword" placeholder="Masukkan Password">
                <span class="toggle-password" onclick="togglePassword()">👁️</span>
            </div>
        </div>
        <button id="loginBtn" onclick="doLogin()">Login</button>
        <div id="loginStatus" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
    </div>

    <!-- WADAH APLIKASI UTAMA -->
    <div id="app-screen">
      <div class="container">
        <div class="header-container">
            <img src="./logo/Logo Barkode Head.png" alt="Logo" class="header-logo">
        </div>

        <!-- Tab Navigation -->
        <div class="tabs">
            <button id="btn-tab-scanner" class="tab-btn active" onclick="switchTab('tab-scanner')">Scanner</button>
            <button id="btn-tab-history" class="tab-btn" onclick="switchTab('tab-history')">History</button>
        </div>

        <!-- Tab 1: Scanner -->
        <div id="tab-scanner" class="tab-content active">
            <div id="reader"></div>
            <div class="form-group">
                <label>Hasil Scan Barcode/QR:</label>
                <input type="text" id="barcodeResult" readonly placeholder="Arahkan kamera ke Barcode">
            </div>
            <div id="verificationResult" class="verification-box"></div>
            <div id="status"></div>
        </div>

        <!-- Tab 2: History -->
        <div id="tab-history" class="tab-content">
            <div class="search-filter-container">
                <input type="date" id="historyDate" onchange="loadHistoryData()">
                <input type="text" id="searchInput" placeholder="Pencarian (Nama/Barcode)..." onkeyup="filterTable()">
            </div>
            <div class="table-responsive">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAllBtn" onchange="toggleSelectAll()"></th>
                            <th>Waktu</th>
                            <th>Material</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Navigasi Halaman -->
            <div class="pagination">
                <button id="btnPrev" onclick="prevPage()">Sebelumnya</button>
                <span id="pageInfo">Halaman 1 dari 1</span>
                <button id="btnNext" onclick="nextPage()">Selanjutnya</button>
            </div>
            
            <div class="action-bar">
                <label>Kirim Data Terpilih via Email</label>
                <div class="form-group" style="margin-bottom: 8px;">
                    <input type="email" id="emailTo" placeholder="Alamat Email Tujuan">
                </div>
                <div class="form-group">
                    <input type="text" id="emailSubject" placeholder="Subjek Email">
                </div>
                <button id="sendEmailBtn" onclick="sendSelectedEmail()">Kirim Email</button>
                <div id="emailStatus" style="margin-top:10px; text-align:center; font-size:0.9rem; font-weight:bold;"></div>
            </div>
        </div>
      </div>

        <!-- Footer -->
        <div class="footer">copyright @2026 HitoDev v1.4</div>
    </div>

    <script>
        // Registrasi Service Worker untuk PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('ServiceWorker berhasil didaftarkan');
                    })
                    .catch(err => {
                        console.log('ServiceWorker gagal didaftarkan: ', err);
                    });
            });
        }

        // GANTI dengan URL Web App Google Apps Script Anda
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxmaQpC2WzS-o91y-GsoPDGcauKbLhsw1UxSdgIQBrSWTCrX0v54060k4BJj5JWubpw/exec';

        // --- FITUR TOGGLE PASSWORD ---
        function togglePassword() {
            const pwdInput = document.getElementById('loginPassword');
            const toggleIcon = document.querySelector('.toggle-password');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                pwdInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // --- FITUR LOGIN ---
        async function doLogin() {
            const nik = document.getElementById('loginNik').value;
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('loginStatus');

            if (!nik || !pass) { status.innerHTML = 'Mohon isi NIK dan Password'; status.className = 'error'; return; }
            
            btn.disabled = true; btn.innerText = "Memverifikasi..."; status.innerHTML = "";
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'login', nik: nik, password: pass })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    // Pindah Layar
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-screen').style.display = 'block';
                    // Auto set default date ke hari ini
                    document.getElementById('historyDate').valueAsDate = new Date();
                    // MULAI SCANNER SETELAH LAYAR TAMPIL
                    startScanner();
                } else {
                    status.innerHTML = result.message; status.className = 'error';
                }
            } catch (err) {
                status.innerHTML = 'Koneksi bermasalah!'; status.className = 'error';
            } finally {
                btn.disabled = false; btn.innerText = "Login";
            }
        }

        // Variabel untuk menampung data dari Google Sheets
        let masterData = [];
        let todayHistoryData = []; // Untuk menampung data riwayat
        let filteredHistoryData = []; // Data untuk pagination
        let currentPage = 1;
        const itemsPerPage = 10;

        // Mengambil data master dari Google Sheets saat aplikasi pertama kali dibuka
        async function fetchMasterData() {
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if (result.status === 'success') {
                    masterData = result.data;
                    console.log("Database Material berhasil dimuat: ", masterData.length, "item");
                }
            } catch (error) {
                console.error("Gagal memuat database material:", error);
            }
        }
        
        // Jalankan penarikan data segera setelah script dijalankan
        fetchMasterData();

        let html5QrCode;
        let isCameraOn = false;

        function startScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            if (!isCameraOn) {
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
                    .then(() => {
                        isCameraOn = true;
                    })
                    .catch(err => {
                        console.error("Gagal memulai kamera:", err);
                        document.getElementById('status').innerHTML = 'Gagal mengakses kamera belakang. Pastikan izin kamera diberikan.';
                        document.getElementById('status').className = 'error';
                    });
            }
        }

        function stopScanner() {
            if (html5QrCode && isCameraOn) {
                html5QrCode.stop().then(() => {
                    isCameraOn = false;
                }).catch(err => console.error("Gagal menghentikan kamera:", err));
            }
        }

        let isProcessing = false;
        let lastScannedCode = "";

        // Fungsi untuk membunyikan suara (Text-to-Speech bawaan browser)
        function playAudioFeedback(textToSpeak) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'id-ID'; // Logat Indonesia
                utterance.rate = 1.0; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            const text = decodedText.trim();
            
            // Cegah trigger berulang saat sedang menyimpan atau jika barcode masih sama
            if (isProcessing || text === lastScannedCode) return;
            
            lastScannedCode = text;
            document.getElementById('barcodeResult').value = text;
            
            // Proses Verifikasi
            const verificationDiv = document.getElementById('verificationResult');
            const match = masterData.find(item => item.kode === text);

            if (match) {
                playAudioFeedback(`OK, ${match.nama}`);
                verificationDiv.innerHTML = `✅ <strong>Verified:</strong> ${match.nama}`;
                verificationDiv.className = 'verification-box success-box';
                
                // Jalankan simpan data otomatis karena data ditemukan
                autoSubmitData(text, match.nama);
            } else {
                playAudioFeedback("Tidak OK");
                verificationDiv.innerHTML = `❌ <strong>Tidak Dikenali:</strong> Data tidak ada di sistem!`;
                verificationDiv.className = 'verification-box error-box';
                
                // Jalankan simpan data otomatis meskipun data tidak ditemukan
                autoSubmitData(text, "Tidak Dikenali");
            }
        }

        // --- FITUR RIWAYAT DAN TABS ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');

            if (tabId === 'tab-history') {
                stopScanner(); // Matikan kamera agar hemat baterai
                loadHistoryData();
                generateEmailSubject(); // Otomatis buat Subject Email
            } else if (tabId === 'tab-scanner') {
                startScanner(); // Nyalakan kamera saat kembali ke tab scanner
            }
        }

        // --- FORMAT SUBJECT EMAIL ---
        function generateEmailSubject() {
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const d = new Date(); // Waktu saat ini
            const date = d.getDate();
            const month = months[d.getMonth()];
            const year = d.getFullYear();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            
            document.getElementById('emailSubject').value = `Laporan Scan Barcode Tanggal ${date} ${month} ${year} - ${hours}.${minutes} WIB`;
        }

        async function loadHistoryData() {
            const tbody = document.getElementById('historyBody');
            const tDate = document.getElementById('historyDate').value;
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Memuat data dari server...</td></tr>';
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'fetch_history', targetDate: tDate })
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    // Tambahkan property originalIndex sebelum filter
                    todayHistoryData = result.data.reverse().map((item, idx) => ({ ...item, originalIndex: idx }));
                    filterTable(); // Trigger filter yang memanggil pagination
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" class="error">Gagal: ${result.message}</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" class="error">Koneksi terputus.</td></tr>';
            }
        }

        function renderPage() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '';
            document.getElementById('selectAllBtn').checked = false;

            if (filteredHistoryData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Tidak ada data.</td></tr>';
                document.getElementById('pageInfo').innerText = "Halaman 1 dari 1";
                return;
            }

            const totalPages = Math.ceil(filteredHistoryData.length / itemsPerPage);
            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} dari ${totalPages}`;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageData = filteredHistoryData.slice(startIndex, startIndex + itemsPerPage);

            pageData.forEach((row) => {
                const tr = document.createElement('tr');
                // Menyimpan data asli dalam attribut data untuk keperluan kirim email
                tr.innerHTML = `
                    <td><input type="checkbox" class="row-checkbox" data-index="${row.originalIndex}"></td>
                    <td style="font-size:0.75rem;">${row.timestamp}</td>
                    <td><strong>${row.nama}</strong><br><span style="font-size:0.75rem; color:#64748b;">${row.barcode}</span></td>
                    <td><span style="font-size:0.8rem; padding:2px 6px; border-radius:4px; background:${row.status === 'Tercatat Otomatis' ? '#d1fae5' : '#e2e8f0'};">${row.status}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const filterText = document.getElementById('searchInput').value.toLowerCase();
            filteredHistoryData = todayHistoryData.filter(row => {
                return row.nama.toLowerCase().includes(filterText) || 
                       row.barcode.toLowerCase().includes(filterText) ||
                       row.status.toLowerCase().includes(filterText);
            });
            currentPage = 1;
            renderPage();
        }

        // Control Pagination
        function prevPage() { 
            if (currentPage > 1) { currentPage--; renderPage(); } 
        }
        function nextPage() { 
            const totalPages = Math.ceil(filteredHistoryData.length / itemsPerPage);
            if (currentPage < totalPages) { currentPage++; renderPage(); } 
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('selectAllBtn').checked;
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.checked = isChecked;
            });
        }

        async function sendSelectedEmail() {
            const emailTo = document.getElementById('emailTo').value;
            const subject = document.getElementById('emailSubject').value;
            const emailStatus = document.getElementById('emailStatus');
            const btn = document.getElementById('sendEmailBtn');

            if (!emailTo || !subject) {
                alert("Mohon isi email tujuan dan subjek terlebih dahulu."); return;
            }

            const selectedIndexes = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.getAttribute('data-index'));
            if (selectedIndexes.length === 0) {
                alert("Pilih minimal satu data dari tabel untuk dikirim."); return;
            }

            const selectedData = selectedIndexes.map(idx => todayHistoryData[idx]);

            btn.disabled = true;
            btn.innerText = "Mengirim...";
            emailStatus.innerHTML = "Sedang mengirim email...";
            emailStatus.className = "";

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: 'send_email',
                        emailTo: emailTo,
                        subject: subject,
                        tableData: selectedData
                    })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    emailStatus.innerHTML = "✅ Email berhasil terkirim!";
                    emailStatus.className = "success";
                    document.getElementById('emailTo').value = "";
                    document.getElementById('emailSubject').value = "";
                    document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = false);
                    document.getElementById('selectAllBtn').checked = false;
                } else {
                    emailStatus.innerHTML = "❌ Gagal: " + result.message;
                    emailStatus.className = "error";
                }
            } catch (error) {
                emailStatus.innerHTML = "❌ Terjadi kesalahan jaringan.";
                emailStatus.className = "error";
            } finally {
                btn.disabled = false;
                btn.innerText = "Kirim Email";
            }
        }

        async function autoSubmitData(barcodeText, namaMaterial) {
            isProcessing = true;
            const statusDiv = document.getElementById('status');

            statusDiv.innerHTML = 'Menyimpan data otomatis...';
            statusDiv.className = '';

            const payload = {
                action: 'scan',
                barcodeText: barcodeText,
                namaMaterial: namaMaterial,
                base64Photo: "" // Dikosongkan karena tidak perlu foto lagi
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    statusDiv.innerHTML = 'Data Tersimpan!';
                    statusDiv.className = 'success';
                } else {
                    statusDiv.innerHTML = 'Gagal menyimpan: ' + result.message;
                    statusDiv.className = 'error';
                }
            } catch (error) {
                console.error('Fetch error:', error);
                statusDiv.innerHTML = 'Gagal terhubung ke Server.';
                statusDiv.className = 'error';
            } finally {
                // Reset scanner otomatis setelah 2.5 detik agar siap men-scan barang berikutnya
                setTimeout(() => {
                    isProcessing = false;
                    lastScannedCode = "";
                    document.getElementById('barcodeResult').value = '';
                    document.getElementById('verificationResult').className = 'verification-box';
                    statusDiv.innerHTML = '';
                }, 2500);
            }
        }
    </script>
</body>
</html>
